<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dina's Fishing Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="game-page">

  <!-- Lobby waiting area -->
  <div id="lobbyArea" class="lobby-screen" style="display:none">
    <div class="lobby-inner">
      <div class="lobby-icon">🎣</div>
      <h1>Dina's Fishing Game</h1>
      <p class="lobby-room">Room: <strong id="roomLabel">—</strong></p>
      <div id="playerList" class="player-list"></div>

      <div class="ruleset-field">
        <label>Ruleset</label>
        <div class="ruleset-toggle">
          <label class="ruleset-option">
            <input type="radio" name="lobbyRuleset" value="classic" checked />
            <span class="ruleset-pill">Classic</span>
          </label>
          <label class="ruleset-option">
            <input type="radio" name="lobbyRuleset" value="dinas" />
            <span class="ruleset-pill">Dina's Rules ✨</span>
          </label>
        </div>
        <p id="lobbyRulesetDesc" class="ruleset-desc">Getting cards earns you another turn.</p>
      </div>

      <button id="startBtn" class="btn-start">Start Game</button>
      <p id="startError" class="error-msg" style="display:none"></p>
    </div>
  </div>

  <!-- Game table -->
  <div id="gameArea" style="display:none">

    <!-- Top bar -->
    <header class="topbar">
      <span class="topbar-logo">🎣 Dina's Fishing Game</span>
      <div class="topbar-right">
        <span id="rulesetBadge" class="ruleset-badge" style="display:none"></span>
        <span class="pond-pill">🐟 <strong id="pondCount">0</strong> left</span>
      </div>
    </header>

    <!-- Table -->
    <div class="table">

      <!-- Opponents arc -->
      <div id="opponentArc" class="opponent-arc"></div>

      <!-- Center action zone -->
      <div class="center-zone">
        <div id="askPanel" style="display:none" class="ask-panel">
          <div class="ask-sentence">
            <select id="targetSelect" class="sel"></select>
            <span>, do you have any</span>
            <select id="rankSelect" class="sel"></select>
            <span>s?</span>
          </div>
          <button id="askBtn" class="btn-ask">Ask 🎣</button>
        </div>
        <div id="waitPanel" style="display:none" class="wait-panel">
          <div id="waitMsg" class="wait-msg"></div>
        </div>
      </div>

      <!-- Your area -->
      <div class="your-area">
        <div class="your-meta">
          <span class="your-name" id="yourName"></span>
          <div id="yourBooks" class="your-books"></div>
        </div>
        <div id="yourHand" class="hand-fan"></div>
      </div>

    </div>
  </div>

  <!-- Result flash -->
  <div id="resultFlash" class="result-flash" style="display:none">
    <div class="result-inner">
      <div id="resultIcon" class="result-icon"></div>
      <div id="resultMsg" class="result-msg"></div>
    </div>
  </div>

  <!-- Winner overlay -->
  <div id="winnerOverlay" class="overlay" style="display:none">
    <div class="overlay-card">
      <div class="overlay-icon">🏆</div>
      <h2 id="winnerTitle"></h2>
      <p id="winnerDesc"></p>
      <button id="playAgainBtn" class="btn-start" style="margin-top:1.5rem">Play Again</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
